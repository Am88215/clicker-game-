<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Neon Clicker</title>
<style>
body {
    margin:0;
    font-family: 'Arial', sans-serif;
    background: #0d0d20;
    color: #00ffff;
    text-align: center;
    overflow-x: hidden;
}

h1 { text-shadow: 0 0 15px #00ffff; }

button {
    padding: 12px 25px;
    margin: 5px;
    font-size: 16px;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    background: #1e1e2f;
    color: #00ffff;
    transition: 0.2s;
}

button:hover {
    background: #00ffff;
    color: black;
    transform: scale(1.1);
}

.stats { margin-bottom: 20px; }
.upgrades, .prestige, .level { margin-top: 20px; }

.floating {
    position: absolute;
    color: #00ff99;
    font-weight: bold;
    pointer-events: none;
    animation: floatUp 1s ease-out forwards;
}

@keyframes floatUp {
    from {opacity:1; transform: translateY(0);}
    to {opacity:0; transform: translateY(-60px);}
}

#levelBarContainer {
    width: 80%;
    height: 25px;
    background: #222;
    margin: 10px auto;
    border-radius: 12px;
    overflow: hidden;
}

#levelBar {
    height: 100%;
    width: 0%;
    background: #00ffff;
    transition: width 0.3s;
}
</style>
</head>
<body>

<h1>⚡ Ultimate Neon Clicker ⚡</h1>

<div class="stats">
    <h2>Money: $<span id="money">0</span></h2>
    <p>Per Click: $<span id="perClick">1</span></p>
    <p>Auto Income: $<span id="autoIncome">0</span>/sec</p>
    <p>Level: <span id="level">1</span> (<span id="xp">0</span>/<span id="xpNeeded">10</span> XP)</p>
    <div id="levelBarContainer">
        <div id="levelBar"></div>
    </div>
    <p>Prestige Multiplier: x<span id="prestigeMulti">1</span></p>
</div>

<button id="clickBtn">CLICK ME</button>

<div class="upgrades">
    <h3>Upgrades</h3>
    <button onclick="buyClick()">Upgrade Click ($<span id="clickCost">10</span>)</button>
    <button onclick="buyAuto()">Auto Income ($<span id="autoCost">50</span>)</button>
    <button onclick="buyMega()">Mega Multiplier ($<span id="megaCost">250</span>)</button>
</div>

<div class="prestige">
    <button onclick="prestige()">🔥 Prestige (Requires $10,000)</button>
</div>

<div class="level">
    <button onclick="resetGame()">Reset Game</button>
</div>

<script>
// Game variables
let money = 0, perClick = 1, autoIncome = 0, prestigeMultiplier = 1;
let clickCost = 10, autoCost = 50, megaCost = 250;

let level = 1, xp = 0, xpNeeded = 10;

// DOM Elements
const moneyEl = document.getElementById("money");
const perClickEl = document.getElementById("perClick");
const autoIncomeEl = document.getElementById("autoIncome");
const prestigeEl = document.getElementById("prestigeMulti");
const clickCostEl = document.getElementById("clickCost");
const autoCostEl = document.getElementById("autoCost");
const megaCostEl = document.getElementById("megaCost");
const levelEl = document.getElementById("level");
const xpEl = document.getElementById("xp");
const xpNeededEl = document.getElementById("xpNeeded");
const levelBar = document.getElementById("levelBar");

// Click function
document.getElementById("clickBtn").addEventListener("click", e=>{
    money += perClick * prestigeMultiplier;
    xp += 1;
    createFloatingText(e.pageX, e.pageY, "+" + (perClick * prestigeMultiplier));
    checkLevel();
    update();
});

// Upgrades
function buyClick(){ if(money>=clickCost){ money-=clickCost; perClick+=1; clickCost=Math.floor(clickCost*1.6); update(); } }
function buyAuto(){ if(money>=autoCost){ money-=autoCost; autoIncome+=1; autoCost=Math.floor(autoCost*1.8); update(); } }
function buyMega(){ if(money>=megaCost){ money-=megaCost; perClick*=2; autoIncome*=2; megaCost=Math.floor(megaCost*2.2); update(); } }

// Prestige
function prestige(){ if(money>=10000){ prestigeMultiplier+=1; money=0; perClick=1; autoIncome=0; clickCost=10; autoCost=50; megaCost=250; level=1; xp=0; xpNeeded=10; update(); }}

// Auto income
setInterval(()=>{ money += autoIncome * prestigeMultiplier; update(); },1000);

// Update display
function update(){
    moneyEl.textContent = Math.floor(money);
    perClickEl.textContent = perClick;
    autoIncomeEl.textContent = autoIncome;
    prestigeEl.textContent = prestigeMultiplier;
    clickCostEl.textContent = clickCost;
    autoCostEl.textContent = autoCost;
    megaCostEl.textContent = megaCost;
    levelEl.textContent = level;
    xpEl.textContent = xp;
    xpNeededEl.textContent = xpNeeded;
    levelBar.style.width = Math.min((xp/xpNeeded)*100,100) + "%";
    saveGame();
}

// Floating text animation
function createFloatingText(x,y,text){
    let el=document.createElement("div");
    el.className="floating";
    el.style.left = x+"px";
    el.style.top = y+"px";
    el.innerText=text;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1000);
}

// Level system
function checkLevel(){
    while(xp>=xpNeeded){
        xp -= xpNeeded;
        level += 1;
        xpNeeded = Math.floor(xpNeeded*1.5);
    }
}

// Save/load
function saveGame(){ localStorage.setItem("clickerSave",JSON.stringify({money, perClick, autoIncome, prestigeMultiplier, clickCost, autoCost, megaCost, level, xp, xpNeeded})); }
function loadGame(){
    let save = JSON.parse(localStorage.getItem("clickerSave"));
    if(save){ Object.assign(window, save); update(); }
}

// Reset
function resetGame(){ localStorage.removeItem("clickerSave"); location.reload(); }

loadGame();
update();
</script>
</body>
</html>
